<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحويل الصوت إلى نص</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 80%;
            max-width: 500px;
        }
        button {
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 25px;
            color: white;
            transition: 0.3s;
            margin: 10px;
        }
        #start-btn { background-color: #28a745; }
        #stop-btn { background-color: #dc3545; }
        button:disabled { background-color: #ccc; }
        
        #result-box {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            min-height: 100px;
            border-radius: 10px;
            background: #fafafa;
            word-wrap: break-word;
        }
        .status { color: #555; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>مسجل الصوت الذكي</h2>
    <p class="status" id="status">اضغط على "بدء التسجيل" للتحدث</p>
    
    <button id="start-btn">بدء التسجيل</button>
    <button id="stop-btn" disabled>إيقاف</button>

    <div id="result-box">النص هيظهر هنا...</div>
</div>

<script>
    // التأكد من دعم المتصفح للخاصية
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
        alert("للأسف متصفحك لا يدعم خاصية التعرف على الصوت. جرب Google Chrome.");
    } else {
        const recognition = new SpeechRecognition();
        
        // إعدادات اللغة (تقدر تغيرها لـ 'en-US' لو عايز إنجليزي)
        recognition.lang = 'ar-SA'; 
        recognition.continuous = true; // يفضل شغال حتى لو سكت شوية
        recognition.interimResults = true; // يظهر النص أثناء الكلام

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const resultBox = document.getElementById('result-box');
        const statusText = document.getElementById('status');

        startBtn.onclick = () => {
            recognition.start();
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusText.innerText = "جاري الاستماع... اتكلم دلوقتي";
            statusText.style.color = "red";
        };

        stopBtn.onclick = () => {
            recognition.stop();
            startBtn.disabled = false;
            stopBtn.disabled = true;
            statusText.innerText = "تم إيقاف التسجيل";
            statusText.style.color = "#555";
        };

        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            resultBox.innerText = transcript;
        };

        recognition.onerror = (event) => {
            console.error("خطأ:", event.error);
            statusText.innerText = "حصل خطأ: " + event.error;
        };
    }
</script>

</body>
</html>
